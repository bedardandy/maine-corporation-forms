checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: terminated-name-required
    description: filing.terminated_fictitious_name is non-empty (the SECOND recital identifies which name is being terminated).
    depends_on_keys:
      - filing.terminated_fictitious_name
    severity: required
  - id: terminated-name-differs-from-real-name
    description: filing.terminated_fictitious_name is different from entity.name (a fictitious-name termination is meaningless if the names match).
    depends_on_keys:
      - filing.terminated_fictitious_name
      - entity.name
    severity: required
  - id: at-least-one-signer
    description: "At least one of {filing.signer_1.printed_name_and_capacity, filing.signer_2.printed_name_and_capacity} is non-empty (per page-0 footnote requiring a person authorized by the LLC to sign)."
    depends_on_keys:
      - filing.signer_1.printed_name_and_capacity
      - filing.signer_2.printed_name_and_capacity
    severity: required
  - id: filing-date-required-and-not-future
    description: filing.date_signed is non-empty and on or before today.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: filing-entity-name-matches-body
    description: "filing.entities[0].name matches entity.name."
    depends_on_keys:
      - "filing.entities[0].name"
      - entity.name
    severity: required
  - id: cover-letter-contact-present
    description: "filing.contact.{name,phone,email} are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-20
    description: filing.total_fees_dollars equals $20 base (page-0 header) plus expedite premium ($0/$50/$100 by tier).
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
