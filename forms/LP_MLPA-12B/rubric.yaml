checks:
  - id: home-name-required
    description: entity.home_jurisdiction_name is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction_name
    severity: required
  - id: home-jurisdiction-required
    description: entity.home_jurisdiction is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: formation-date-required
    description: entity.formation_date_in_home_jurisdiction is non-empty.
    depends_on_keys:
      - entity.formation_date_in_home_jurisdiction
    severity: required
  - id: maine-auth-date-required-and-not-after-filing
    description: entity.maine_authorization_date is non-empty and on or before filing.date_signed (cannot cancel before initial authorization).
    depends_on_keys:
      - entity.maine_authorization_date
      - filing.date_signed
    severity: required
  - id: principal-office-required-not-pobox
    description: entity.principal_office.physical_address is non-empty and not a P.O. Box.
    depends_on_keys:
      - entity.principal_office.physical_address
    severity: required
  - id: required-office-conditional-not-pobox
    description: "If entity.required_office.physical_address is set, it is not a P.O. Box. (FIFTH is conditional on home-jurisdiction law per the * footnote.)"
    depends_on_keys:
      - entity.required_office.physical_address
    severity: required
  - id: signer-required
    description: "At least one signer present: general_partner_1.printed_name OR (general_partner_entity_1.name + general_partner_entity_1.signer_printed_name_and_capacity). §1324.1.M only requires one GP signature."
    depends_on_keys:
      - general_partner_1.printed_name
      - general_partner_entity_1.name
      - general_partner_entity_1.signer_printed_name_and_capacity
    severity: required
  - id: entity-gp-consistency
    description: "If general_partner_entity_1.name is set, general_partner_entity_1.signer_printed_name_and_capacity must also be set."
    depends_on_keys:
      - general_partner_entity_1.name
      - general_partner_entity_1.signer_printed_name_and_capacity
    severity: required
  - id: filing-date-not-future
    description: filing.date_signed is not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: fee-base-90
    description: filing.total_fees_dollars equals $90 (per page-0 header) plus expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: advisory
  - id: contact-fields-nonempty
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (cover-letter primitive)."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: filing-entities-nonempty
    description: "filing.entities[0].name is non-empty (cover-letter primitive)."
    depends_on_keys:
      - "filing.entities[0].name"
    severity: required
