checks:
  - id: converting-entity-name-required
    description: entity.name (converting LP name) is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: converting-entity-form-required
    description: "entity.organization_type is non-empty (typically 'Limited Partnership' on this form)."
    depends_on_keys:
      - entity.organization_type
    severity: required
  - id: converting-entity-formation-date-not-future
    description: entity.formation_date is on or before filing.date_signed.
    depends_on_keys:
      - entity.formation_date
      - filing.date_signed
    severity: required
  - id: new-entity-name-required
    description: conversion.new_entity.name is non-empty.
    depends_on_keys:
      - conversion.new_entity.name
    severity: required
  - id: new-entity-name-suffix-by-type
    description: "conversion.new_entity.name contains a statutory suffix appropriate for conversion.new_entity.type (e.g., 'LLC' for LLC per 31 MRSA §1508; 'Corp.'/'Inc.' for corporation per 13-C MRSA §401)."
    depends_on_keys:
      - conversion.new_entity.name
      - conversion.new_entity.type
    severity: required
  - id: effective-date-required
    description: conversion.effective_date is non-empty (THIRD recital is required).
    depends_on_keys:
      - conversion.effective_date
    severity: required
  - id: effective-date-not-past
    description: conversion.effective_date is on or after filing.date_signed.
    depends_on_keys:
      - conversion.effective_date
      - filing.date_signed
    severity: required
  - id: exactly-one-result-type
    description: "Exactly one SEVENTH option is selected (conversion.result_type ∈ {'filing_required', 'no_filing_required'})."
    depends_on_keys:
      - conversion.result_type
    severity: required
  - id: exhibit-letter-when-filing-required
    description: "If conversion.result_type = 'filing_required', conversion.new_entity_organizing_document_exhibit_letter must be set."
    depends_on_keys:
      - conversion.result_type
      - conversion.new_entity_organizing_document_exhibit_letter
    severity: required
  - id: service-address-when-foreign-unauthorized
    description: "If conversion.new_entity.governing_statute_jurisdiction != 'Maine' AND the resulting entity is not authorized to transact business in Maine (SIXTH header), conversion.new_entity.foreign_service_of_process_mailing_address.line1 must be set."
    depends_on_keys:
      - conversion.new_entity.governing_statute_jurisdiction
      - conversion.new_entity.foreign_service_of_process_mailing_address.line1
    severity: required
  - id: general-partner-signatures-required
    description: "At least general_partner_1.printed_name_and_capacity must be populated; ALL GPs of the converting LP must sign per recital. If the LP has >2 GPs, overflow attaches on additional pages."
    depends_on_keys:
      - general_partner_1.printed_name_and_capacity
    severity: required
  - id: filing-date-required
    description: filing.date_signed is non-empty.
    depends_on_keys:
      - filing.date_signed
    severity: required
