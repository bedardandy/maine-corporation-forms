checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: original-statement-date-required
    description: denial.original_statement_filing_date is non-empty (SOS needs this to locate the original record).
    depends_on_keys:
      - denial.original_statement_filing_date
    severity: required
  - id: original-statement-date-not-future
    description: denial.original_statement_filing_date is on or before filing.date_signed (cannot deny a statement that has not yet been filed).
    depends_on_keys:
      - denial.original_statement_filing_date
      - filing.date_signed
    severity: required
  - id: filing-date-required
    description: filing.date_signed is non-empty.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty (Shape D; per §1676.1.D the signer must be the person whose authority is being denied).
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: contact-info-required
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-50
    description: filing.total_fees_dollars equals $50 base (per page 0 header) plus expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
