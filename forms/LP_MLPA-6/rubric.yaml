checks:
  - id: lp-name-suffix-by-type
    description: "If entity.is_lllp is false: name contains 'Limited Partnership', 'L.P.' or 'LP'. If entity.is_lllp is true (and is_professional_lllp false): name contains 'L.L.L.P.', 'LLLP', or 'Limited Liability Limited Partnership' (no 'L.P.'/'LP'). If entity.is_professional_lllp is true: name contains 'PLLLP', 'P.L.L.L.P.', or 'S.L.L.L.P.'."
    depends_on_keys:
      - entity.name
      - entity.is_lllp
      - entity.is_professional_lllp
    severity: required
  - id: designated-office-physical-not-pobox
    description: entity.designated_office.physical_address is not a P.O. Box.
    depends_on_keys:
      - entity.designated_office.physical_address
    severity: required
  - id: exactly-one-registered-agent-type
    description: Exactly one of THIRD commercial/noncommercial options is selected.
    depends_on_keys:
      - registered_agent.type
    severity: required
  - id: cra-public-number-when-commercial
    description: "If registered_agent.type = 'commercial', registered_agent.cra_public_number must be set."
    depends_on_keys:
      - registered_agent.type
      - registered_agent.cra_public_number
    severity: required
  - id: registered-agent-physical-not-pobox
    description: registered_agent.physical_address is not a P.O. Box.
    depends_on_keys:
      - registered_agent.physical_address
    severity: required
  - id: at-least-one-general-partner
    description: At least one general_partner_N row is fully populated (name + address); LP requires ≥1 GP.
    depends_on_keys:
      - general_partner_1.name
      - general_partner_1.address
    severity: required
  - id: additional-exhibit-when-flagged
    description: "If general_partner.additional_attached is true, general_partner.additional_exhibit_letter must be set."
    depends_on_keys:
      - general_partner.additional_attached
      - general_partner.additional_exhibit_letter
    severity: required
  - id: all-gps-signed
    description: Every populated general_partner_N has a corresponding signature/printed_name (individual block) OR appears as a general_partner_entity_N (entity block); certificate must be signed by all GPs per 31 MRSA §1321.
    depends_on_keys:
      - general_partner_1.name
      - general_partner_1.printed_name
      - general_partner_entity_1.name
    severity: required
  - id: professional-services-when-flagged
    description: "If entity.is_professional_lllp is true, entity.professional_services_description must be non-empty."
    depends_on_keys:
      - entity.is_professional_lllp
      - entity.professional_services_description
    severity: required
  - id: lllp-and-professional-suffix-mutual
    description: "If entity.is_professional_lllp is true, entity.is_lllp must also be true (PLLLP is a special case of LLLP)."
    depends_on_keys:
      - entity.is_lllp
      - entity.is_professional_lllp
    severity: required
