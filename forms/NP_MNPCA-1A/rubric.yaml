checks:
  - id: reserved-name-required
    description: name_reservation.name_to_reserve is non-empty.
    depends_on_keys:
      - name_reservation.name_to_reserve
    severity: required
  - id: nonprofit-no-suffix-required
    description: name_reservation.name_to_reserve need NOT contain a corporate suffix (13-B MRSA does not mandate suffixes for nonprofit corporations). Suppress any 13-C §401-style suffix-validation rule on this nonprofit form.
    depends_on_keys:
      - name_reservation.name_to_reserve
    severity: optional
  - id: original-applicant-required
    description: name_reservation.applicant.name is non-empty (transferor identity).
    depends_on_keys:
      - name_reservation.applicant.name
    severity: required
  - id: transferee-name-required
    description: name_reservation.transferee.name is non-empty.
    depends_on_keys:
      - name_reservation.transferee.name
    severity: required
  - id: transferee-address-required
    description: name_reservation.transferee.address is non-empty.
    depends_on_keys:
      - name_reservation.transferee.address
    severity: required
  - id: transferor-signer-required
    description: "name_reservation.applicant.printed_name_and_capacity is non-empty (the transferor or any duly authorized person must sign per the page-0 'ORIGINAL APPLICANT (Transferor)' label)."
    depends_on_keys:
      - name_reservation.applicant.printed_name_and_capacity
    severity: required
  - id: filing-date-required-not-future
    description: filing.date_signed is non-empty and not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-fields-nonempty
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (cover-letter primitive)."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: filing-entities-nonempty
    description: "filing.entities[0].name is non-empty (cover-letter primitive); should equal name_reservation.name_to_reserve."
    depends_on_keys:
      - "filing.entities[0].name"
      - name_reservation.name_to_reserve
    severity: optional
  - id: fee-base-5-plus-expedite
    description: "filing.total_fees_dollars equals $5 base fee plus any expedite premium ($50 for 24h_next_business_day, $100 for immediate_same_day, $0 for hold_for_pickup)."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
