checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: at-least-one-authority-block
    description: authority_1.person_or_position is non-empty (the form requires at least one person or position to have a documented grant or limitation — otherwise the filing has no purpose).
    depends_on_keys:
      - authority_1.person_or_position
    severity: required
  - id: authority-text-when-person-set
    description: "For each N in {1,2,3}: if authority_N.person_or_position is non-empty, authority_N.authority_text_line_1 must also be non-empty (a person/position with no recited authority/limitation is malformed)."
    depends_on_keys:
      - authority_1.person_or_position
      - authority_1.authority_text_line_1
      - authority_2.person_or_position
      - authority_2.authority_text_line_1
      - authority_3.person_or_position
      - authority_3.authority_text_line_1
    severity: required
  - id: at-least-one-signer
    description: filing.signer_1.printed_name_and_capacity is non-empty.
    depends_on_keys:
      - filing.signer_1.printed_name_and_capacity
    severity: required
  - id: filing-date-required
    description: filing.date_signed is non-empty.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: cover-letter-entity-matches-body
    description: "filing.entities[0].name equals entity.name."
    depends_on_keys:
      - "filing.entities[0].name"
      - entity.name
    severity: required
  - id: cover-letter-contact-present
    description: "filing.contact.{name,phone,email} are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-50
    description: "filing.total_fees_dollars equals $50 base (per page-0 'Filing Fee $50.00' header) plus expedite premium."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
