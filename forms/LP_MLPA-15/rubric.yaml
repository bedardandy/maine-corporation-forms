checks:
  - id: consenting-entity-name-required
    description: entity.name (the consenting LP) is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: indistinguishable-name-required
    description: name_consent.indistinguishable_name is non-empty.
    depends_on_keys:
      - name_consent.indistinguishable_name
    severity: required
  - id: requestor-name-required
    description: name_consent.requestor.name is non-empty.
    depends_on_keys:
      - name_consent.requestor.name
    severity: required
  - id: indistinguishable-name-distinct-from-entity
    description: "name_consent.indistinguishable_name differs from entity.name (case-sensitive — 'indistinguishable' means differing only on insubstantial grounds, not literally identical)."
    depends_on_keys:
      - name_consent.indistinguishable_name
      - entity.name
    severity: required
  - id: replacement-name-required
    description: name_consent.replacement_name is non-empty (the consenting LP commits to renaming itself).
    depends_on_keys:
      - name_consent.replacement_name
    severity: required
  - id: replacement-name-distinguishable
    description: name_consent.replacement_name differs from both entity.name (the old name) and name_consent.indistinguishable_name (the granted name).
    depends_on_keys:
      - name_consent.replacement_name
      - entity.name
      - name_consent.indistinguishable_name
    severity: required
  - id: replacement-name-has-lp-suffix
    description: "name_consent.replacement_name contains a valid LP suffix per 31 MRSA §1308 (e.g., 'L.P.', 'LP', 'Limited Partnership')."
    depends_on_keys:
      - name_consent.replacement_name
    severity: required
  - id: signer-required
    description: "filing.signer.printed_name_and_capacity is non-empty (must be a general partner per footnote **)."
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: filing-date-not-future
    description: filing.date_signed is not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: fee-base-35
    description: "filing.total_fees_dollars >= $35 base fee plus any expedite premium ($50 24h or $100 immediate). May be higher if a bundled name-change form's fee is rolled in."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
  - id: entities-consistent
    description: "filing.entities[0].name on cover letter matches entity.name on body (the consenting LP)."
    depends_on_keys:
      - "filing.entities[0].name"
      - entity.name
    severity: optional
