checks:
  - id: entity-name-matches-records
    description: "entity.name matches the corporation's name of record at the SOS (the entity must currently exist in dissolved status)."
    depends_on_keys:
      - entity.name
    severity: required
  - id: authorization-within-120-days
    description: revocation.authorization_date is within 120 days after revocation.original_dissolution_date (per 13-C MRSA §1405.1).
    depends_on_keys:
      - revocation.authorization_date
      - revocation.original_dissolution_date
    severity: required
  - id: original-dissolution-not-future
    description: revocation.original_dissolution_date is on or before filing.date_signed (cannot revoke a dissolution that has not yet occurred).
    depends_on_keys:
      - revocation.original_dissolution_date
      - filing.date_signed
    severity: required
  - id: authorization-not-future
    description: revocation.authorization_date is on or before filing.date_signed.
    depends_on_keys:
      - revocation.authorization_date
      - filing.date_signed
    severity: required
  - id: exactly-one-authority-type
    description: Exactly one of the four THIRD checkboxes is selected (revocation.authority_type resolves to a single enum value).
    depends_on_keys:
      - revocation.authority_type
    severity: required
  - id: signer-capacity-present
    description: "filing.signer.printed_name_and_capacity includes both a name and a capacity (officer title or 'Clerk') — 13-C MRSA §121.5 limits signing authority."
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: cover-letter-contact-present
    description: "filing.contact.{name,phone,email} are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: filing-entity-name-matches-body
    description: "filing.entities[0].name on the cover letter matches entity.name on the body."
    depends_on_keys:
      - "filing.entities[0].name"
      - entity.name
    severity: required
  - id: fee-matches-tier
    description: filing.total_fees_dollars equals base $75 plus expedite premium per filing.expedited_service tier.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
