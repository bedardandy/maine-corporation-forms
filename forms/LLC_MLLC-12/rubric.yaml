checks:
  - id: home-name-required
    description: entity.home_jurisdiction_name is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction_name
    severity: required
  - id: alt-name-when-suffix-missing
    description: "If entity.home_jurisdiction_name does not include an LLC-style suffix (per §1508.1), entity.maine_assumed_name_for_suffix must be set and must include a valid suffix."
    depends_on_keys:
      - entity.home_jurisdiction_name
      - entity.maine_assumed_name_for_suffix
    severity: required
  - id: fict4-when-fictitious-name
    description: "If entity.maine_fictitious_name is set, filing.fict4_accompanies must be true."
    depends_on_keys:
      - entity.maine_fictitious_name
      - filing.fict4_accompanies
    severity: required
  - id: formation-date-before-maine-start
    description: entity.formation_date_in_home_jurisdiction is on or before entity.maine_activities_start_date.
    depends_on_keys:
      - entity.formation_date_in_home_jurisdiction
      - entity.maine_activities_start_date
    severity: required
  - id: home-jurisdiction-not-maine
    description: "entity.home_jurisdiction is not 'Maine' or 'ME' (foreign-qualification implies a non-Maine home)."
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: exactly-one-registered-agent-type
    description: Exactly one of SIXTH commercial/noncommercial options is selected.
    depends_on_keys:
      - registered_agent.type
    severity: required
  - id: registered-agent-physical-not-pobox
    description: registered_agent.physical_address is not a P.O. Box.
    depends_on_keys:
      - registered_agent.physical_address
    severity: required
  - id: manager-list-consistency
    description: "If manager.additional_attached is false, all manager_N entries (1-3) that are populated must have both name and address; if true, an exhibit letter must be present."
    depends_on_keys:
      - manager.additional_attached
      - manager_1.name
      - manager_1.address
      - manager_2.name
      - manager_2.address
      - manager_3.name
      - manager_3.address
    severity: required
  - id: professional-services-when-flagged
    description: "If entity.is_professional_llc is true, entity.professional_services_description must be non-empty."
    depends_on_keys:
      - entity.is_professional_llc
      - entity.professional_services_description
    severity: required
  - id: series-exhibit-when-flagged
    description: "If entity.is_series_llc is true, entity.series_llc_exhibit_letter must be set."
    depends_on_keys:
      - entity.is_series_llc
      - entity.series_llc_exhibit_letter
    severity: required
  - id: certificate-of-existence-recency
    description: "TWELFTH paragraph requires that an attached certificate of existence (or equivalent) is dated within 90 days before delivery; tracked manually in filing.notes since the COE is a separate attachment, not a form field."
    depends_on_keys: []
    severity: required
