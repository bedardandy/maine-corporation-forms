checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: future-effective-date-required
    description: conversion.future_effective_date is non-empty (FIRST — the date the original conversion was scheduled to become effective).
    depends_on_keys:
      - conversion.future_effective_date
    severity: required
  - id: abandonment-before-effective-date
    description: "filing.date_signed is strictly before conversion.future_effective_date — per 13-C MRSA §958, abandonment must be filed before the entity conversion becomes effective."
    depends_on_keys:
      - filing.date_signed
      - conversion.future_effective_date
    severity: required
  - id: signer-required
    description: "filing.signer.printed_name_and_capacity is non-empty (Shape D; signer must be 'officer or other duly authorized representative' per §958.2)."
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: filing-date-required-not-future
    description: filing.date_signed is non-empty and not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-fields-nonempty
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (cover-letter primitive)."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: filing-entities-nonempty
    description: "filing.entities[0].name is non-empty (cover-letter primitive)."
    depends_on_keys:
      - "filing.entities[0].name"
    severity: required
  - id: fee-base-35-plus-expedite
    description: "filing.total_fees_dollars equals $35 base fee plus any expedite premium ($50 for 24h_next_business_day, $100 for immediate_same_day, $0 for hold_for_pickup)."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
