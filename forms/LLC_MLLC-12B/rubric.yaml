checks:
  - id: home-name-required
    description: entity.home_jurisdiction_name is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction_name
    severity: required
  - id: home-jurisdiction-not-maine
    description: "entity.home_jurisdiction is not 'Maine' or 'ME' (this form is foreign-only)."
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: fictitious-name-distinct
    description: "If entity.maine_fictitious_name is non-empty, it differs from entity.home_jurisdiction_name (case-insensitive)."
    depends_on_keys:
      - entity.maine_fictitious_name
      - entity.home_jurisdiction_name
    severity: required
  - id: formation-before-qualification
    description: entity.formation_date_in_home_jurisdiction is on or before entity.maine_authorization_date (a foreign LLC must exist in its home jurisdiction before it can qualify in Maine).
    depends_on_keys:
      - entity.formation_date_in_home_jurisdiction
      - entity.maine_authorization_date
    severity: required
  - id: maine-auth-date-not-future
    description: entity.maine_authorization_date is not in the future and is on or before filing.date_signed.
    depends_on_keys:
      - entity.maine_authorization_date
      - filing.date_signed
    severity: required
  - id: principal-office-required
    description: entity.principal_office.physical_address is non-empty (SIXTH is unconditional).
    depends_on_keys:
      - entity.principal_office.physical_address
    severity: required
  - id: service-address-when-no-agent
    description: "If the entity is not maintaining a registered agent in Maine, entity.post_cancellation_service_address.line1 must be non-empty (FIFTH applies). At least line1 is required when FIFTH applies; line2 is optional."
    depends_on_keys:
      - entity.post_cancellation_service_address.line1
      - entity.post_cancellation_service_address.line2
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty (signer must be a person authorized by the LLC per 31 MRSA §1676.1.B).
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: filing-date-required
    description: filing.date_signed is non-empty and not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-fields-required
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: expedited-service-at-most-one
    description: At most one of the three expedite checkboxes is selected.
    depends_on_keys:
      - filing.expedited_service
    severity: required
  - id: fee-base-90
    description: "filing.total_fees_dollars is approximately $90 base (per page-0 'Filing Fee $90.00') plus $50 (24h) or $100 (immediate) for expedited service."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
