checks:
  - id: home-jurisdiction-name-required
    description: entity.home_jurisdiction_name is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction_name
    severity: required
  - id: exactly-one-application-type
    description: "Exactly one of FIRST checkboxes is selected (filing.application_type ∈ {'new','renewal'})."
    depends_on_keys:
      - filing.application_type
    severity: required
  - id: home-jurisdiction-not-maine
    description: "entity.home_jurisdiction is not 'Maine' or 'ME' (foreign corporations only — a domestic Maine corp would file MBCA-5 / amend instead)."
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: principal-office-address-complete
    description: entity.principal_office.physical_address.street and entity.principal_office.physical_address.city_state_zip are both non-empty.
    depends_on_keys:
      - entity.principal_office.physical_address.street
      - entity.principal_office.physical_address.city_state_zip
    severity: required
  - id: formation-date-required
    description: entity.formation_date_in_home_jurisdiction is non-empty.
    depends_on_keys:
      - entity.formation_date_in_home_jurisdiction
    severity: required
  - id: business-purpose-required
    description: entity.business_purpose is non-empty.
    depends_on_keys:
      - entity.business_purpose
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty.
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: certificate-of-existence-attached
    description: "FIFTH paragraph requires an attached certificate of existence (or document of similar import) duly authenticated by the SOS of the home jurisdiction, dated within 90 days before delivery. Not enforceable from form fields alone — tracked manually as filing.notes."
    depends_on_keys: []
    severity: required
  - id: renewal-window-october-december
    description: "If filing.application_type = 'renewal', filing.date_signed should fall between October 1 and December 31 (per 13-C MRSA §403 renewal-window rule, page-0 implicit). Optional check, statutory deadline."
    depends_on_keys:
      - filing.application_type
      - filing.date_signed
    severity: optional
  - id: fee-base-200-per-year
    description: filing.total_fees_dollars equals $20 × number of months remaining in calendar year (new) or $200 (renewal) plus any expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.application_type
      - filing.expedited_service
    severity: optional
