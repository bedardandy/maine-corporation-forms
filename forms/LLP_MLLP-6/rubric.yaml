checks:
  - id: entity-name-required-and-suffix
    description: "entity.name is non-empty and contains a statutory LLP suffix ('Limited Liability Partnership', 'L.L.P.', or 'LLP') per 31 MRSA §803-A."
    depends_on_keys:
      - entity.name
    severity: required
  - id: professional-services-when-flagged
    description: "If entity.is_professional_llp is true, entity.professional_services_description must be non-empty."
    depends_on_keys:
      - entity.is_professional_llp
      - entity.professional_services_description
    severity: required
  - id: exactly-one-registered-agent-type
    description: Exactly one of SECOND commercial/noncommercial options is selected.
    depends_on_keys:
      - registered_agent.type
    severity: required
  - id: registered-agent-name-required
    description: "registered_agent.name is non-empty (in either Text4 commercial slot or Text5 noncommercial slot, matching the selected type)."
    depends_on_keys:
      - registered_agent.name
      - registered_agent.type
    severity: required
  - id: cra-number-when-commercial
    description: "If registered_agent.type='commercial', registered_agent.cra_public_number must be set."
    depends_on_keys:
      - registered_agent.type
      - registered_agent.cra_public_number
    severity: required
  - id: registered-agent-physical-not-pobox
    description: registered_agent.physical_address is non-empty and is not a P.O. Box.
    depends_on_keys:
      - registered_agent.physical_address
    severity: required
  - id: contact-partner-block-present
    description: Either contact_partner.name AND contact_partner.address are populated (split widgets) OR contact_partner.name_and_address is populated (combined widget).
    depends_on_keys:
      - contact_partner.name
      - contact_partner.address
      - contact_partner.name_and_address
    severity: required
  - id: exhibit-letter-format
    description: "If entity.additional_provisions_exhibit_letter is populated, it must be a single uppercase letter A-Z."
    depends_on_keys:
      - entity.additional_provisions_exhibit_letter
    severity: required
  - id: at-least-one-partner-signer
    description: "At least one of {partner_1.printed_name, partner_2.printed_name, partner_3.printed_name, partner_entity_1.signer_printed_name_and_capacity, partner_entity_2.signer_printed_name_and_capacity, partner_entity_3.signer_printed_name_and_capacity} is non-empty (per page-1 footnote requirement: '(1) one or more partners who are authorized OR (2) any duly authorized person')."
    depends_on_keys:
      - partner_1.printed_name
      - partner_2.printed_name
      - partner_3.printed_name
      - partner_entity_1.signer_printed_name_and_capacity
      - partner_entity_2.signer_printed_name_and_capacity
      - partner_entity_3.signer_printed_name_and_capacity
    severity: required
  - id: entity-partner-block-internally-consistent
    description: "If partner_entity_N.name is populated, partner_entity_N.signer_printed_name_and_capacity must also be populated (and vice versa) for each N in 1..3."
    depends_on_keys:
      - partner_entity_1.name
      - partner_entity_1.signer_printed_name_and_capacity
      - partner_entity_2.name
      - partner_entity_2.signer_printed_name_and_capacity
      - partner_entity_3.name
      - partner_entity_3.signer_printed_name_and_capacity
    severity: required
  - id: filing-date-required-and-not-future
    description: filing.date_signed is non-empty and on or before today.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: filing-entity-name-matches-body
    description: "filing.entities[0].name matches entity.name."
    depends_on_keys:
      - "filing.entities[0].name"
      - entity.name
    severity: required
  - id: cover-letter-contact-present
    description: "filing.contact.{name,phone,email} are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-175
    description: "filing.total_fees_dollars equals $175 base (page-0 'Filing Fee $175.00' header) plus expedite premium ($0/$50/$100 by tier)."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
