checks:
  - id: home-jurisdiction-name-required
    description: entity.home_jurisdiction_name is non-empty (foreign-only form per FOREIGN NONPROFIT CORPORATION page-0 banner).
    depends_on_keys:
      - entity.home_jurisdiction_name
    severity: required
  - id: home-jurisdiction-required
    description: entity.home_jurisdiction is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: home-jurisdiction-not-maine
    description: "entity.home_jurisdiction is not 'Maine' or 'ME' (domestication implies a non-Maine origin)."
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: formation-date-required
    description: entity.formation_date_in_home_jurisdiction is non-empty and parses as a date on or before filing.date_signed.
    depends_on_keys:
      - entity.formation_date_in_home_jurisdiction
      - filing.date_signed
    severity: required
  - id: articles-exhibit-required
    description: domestication.articles_exhibit_letter is non-empty (the new-entity Articles of Incorporation exhibit must be attached).
    depends_on_keys:
      - domestication.articles_exhibit_letter
    severity: required
  - id: future-effective-date-not-past
    description: "If domestication.future_effective_date is set, it must be on or after filing.date_signed."
    depends_on_keys:
      - domestication.future_effective_date
      - filing.date_signed
    severity: required
  - id: maine-name-no-suffix-required
    description: "If domestication.maine_name is set, no corporate suffix is required by 13-B MRSA (nonprofit corporations are not subject to the 13-C §401 suffix mandate). Suppress any suffix-validation rule."
    depends_on_keys:
      - domestication.maine_name
    severity: optional
  - id: signer-required
    description: "filing.signer.printed_name_and_capacity is non-empty (form footer requires 'an officer or other duly authorized representative')."
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: filing-date-not-future
    description: filing.date_signed is not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-info-complete
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (cover-letter primitive: per the cover-letter NOTE 'Failure to provide a contact name and telephone number or email address will result in the return of the erroneous filing(s)')."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-125
    description: "filing.total_fees_dollars >= $125 base per page-0 header (plus expedite premium and any bundled-filing fees)."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
