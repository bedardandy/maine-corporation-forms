checks:
  - id: home-name-required
    description: entity.home_jurisdiction_name is non-empty.
    depends_on_keys:
      - entity.home_jurisdiction_name
    severity: required
  - id: exactly-one-application-type
    description: "Exactly one of the FIRST checkboxes is selected (filing.application_type ∈ {'new','renewal'})."
    depends_on_keys:
      - filing.application_type
    severity: required
  - id: home-jurisdiction-required-and-non-maine
    description: "entity.home_jurisdiction is non-empty and not 'Maine' or 'ME' (the form is for foreign LLCs only)."
    depends_on_keys:
      - entity.home_jurisdiction
    severity: required
  - id: principal-office-address-required
    description: entity.principal_office.physical_address is non-empty.
    depends_on_keys:
      - entity.principal_office.physical_address
    severity: required
  - id: formation-date-required-and-not-future
    description: entity.formation_date_in_home_jurisdiction is non-empty and on or before filing.date_signed.
    depends_on_keys:
      - entity.formation_date_in_home_jurisdiction
      - filing.date_signed
    severity: required
  - id: business-purpose-required
    description: entity.business_purpose is non-empty.
    depends_on_keys:
      - entity.business_purpose
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty.
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: filing-date-required
    description: filing.date_signed is non-empty.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: renewal-window-october-december
    description: "If filing.application_type = 'renewal', filing.date_signed should fall between October 1 and December 31 (per the FIRST recital's renewal-window rule)."
    depends_on_keys:
      - filing.application_type
      - filing.date_signed
    severity: optional
  - id: fee-by-application-type
    description: filing.total_fees_dollars equals $20 × number of months remaining in calendar year (new) or $200 (renewal) plus any expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.application_type
      - filing.expedited_service
    severity: optional
  - id: cover-letter-entity-matches
    description: "filing.entities[0].name equals entity.home_jurisdiction_name."
    depends_on_keys:
      - "filing.entities[0].name"
      - entity.home_jurisdiction_name
    severity: required
  - id: cover-letter-contact-present
    description: "filing.contact.{name,phone,email} are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
