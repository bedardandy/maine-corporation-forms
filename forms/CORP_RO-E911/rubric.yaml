checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: current-clerk-name-required
    description: clerk_change.current_clerk_or_agent_name is non-empty (must match the SOS record exactly to identify the agent).
    depends_on_keys:
      - clerk_change.current_clerk_or_agent_name
    severity: required
  - id: old-address-required
    description: clerk_change.old_address is non-empty.
    depends_on_keys:
      - clerk_change.old_address
    severity: required
  - id: new-physical-address-required
    description: clerk_change.new_physical_address is non-empty.
    depends_on_keys:
      - clerk_change.new_physical_address
    severity: required
  - id: new-physical-not-pobox
    description: "clerk_change.new_physical_address must not be a P.O. Box (page-0 THIRD parenthetical 'physical location, not P.O. Box')."
    depends_on_keys:
      - clerk_change.new_physical_address
    severity: required
  - id: old-and-new-distinct
    description: clerk_change.old_address differs from clerk_change.new_physical_address (an E911 / USPS notification with identical addresses is vacuous).
    depends_on_keys:
      - clerk_change.old_address
      - clerk_change.new_physical_address
    severity: required
  - id: exactly-one-authorization
    description: "Exactly one of clerk_change.address_change_authorized_by ∈ {'town_municipality', 'us_postal_service'} is selected (FOURTH 'choose one')."
    depends_on_keys:
      - clerk_change.address_change_authorized_by
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty (Shape D — must be signed by the municipal official or postmaster per page-0 footnote).
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: signer-capacity-matches-authorization
    description: "filing.signer.printed_name_and_capacity capacity reflects the selected clerk_change.address_change_authorized_by — e.g., 'Town Clerk' / 'Municipal Officer' for town_municipality, 'Postmaster' for us_postal_service."
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
      - clerk_change.address_change_authorized_by
    severity: advisory
  - id: filing-date-required
    description: filing.date_signed is non-empty and not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: cover-letter-contact-required
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are all non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-zero-base
    description: "filing.total_fees_dollars equals $0 base (page-0 'No Filing Fee') plus any expedite premium per filing.expedited_service tier."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: advisory
