checks:
  - id: pre-conversion-name-required
    description: entity.name (pre-conversion partnership name) is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: exactly-one-new-entity-type
    description: "Exactly one of the SECOND checkboxes is selected, populating conversion.new_entity.type with a valid enum value."
    depends_on_keys:
      - conversion.new_entity.type
    severity: required
  - id: new-entity-name-required
    description: conversion.new_entity.name is non-empty.
    depends_on_keys:
      - conversion.new_entity.name
    severity: required
  - id: new-entity-name-suffix-by-type
    description: "conversion.new_entity.name contains a statutory suffix appropriate for conversion.new_entity.type — 'LP'/'L.P.'/'Limited Partnership' for limited_partnership, 'LLLP'/'L.L.L.P.' for limited_liability_limited_partnership, 'LLC'/'L.L.C.'/'Limited Liability Company' for limited_liability_company, 'Corp'/'Inc'/'Incorporated'/'Corporation' for corporation."
    depends_on_keys:
      - conversion.new_entity.name
      - conversion.new_entity.type
    severity: required
  - id: provisions-exhibit-required
    description: "conversion.new_entity_provisions_exhibit_letter is non-empty (organizing documents must be attached as the corresponding formation form: MLPA-6-1, MLLC-6, or MBCA-6-1)."
    depends_on_keys:
      - conversion.new_entity_provisions_exhibit_letter
    severity: required
  - id: future-effective-date-valid
    description: "If conversion.future_effective_date is set, it must be on or after filing.date_signed and not exceed 90 days from filing.date_signed (per page-0 form text 'Not to exceed 90 days')."
    depends_on_keys:
      - conversion.future_effective_date
      - filing.date_signed
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty (must be at least one partner OR a duly authorized representative per page-1 footnote).
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: fee-base-150
    description: filing.total_fees_dollars equals $150 base (per page-0 header) plus expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
