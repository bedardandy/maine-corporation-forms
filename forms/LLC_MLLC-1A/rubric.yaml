checks:
  - id: reserved-name-required
    description: entity.reserved_name is non-empty.
    depends_on_keys:
      - entity.reserved_name
    severity: required
  - id: original-applicant-required
    description: name_reservation.original_applicant.name is non-empty.
    depends_on_keys:
      - name_reservation.original_applicant.name
    severity: required
  - id: transferee-name-required
    description: name_reservation.transferee.name is non-empty.
    depends_on_keys:
      - name_reservation.transferee.name
    severity: required
  - id: transferee-address-required
    description: name_reservation.transferee.address is non-empty.
    depends_on_keys:
      - name_reservation.transferee.address
    severity: required
  - id: transferee-distinct-from-applicant
    description: name_reservation.transferee.name differs from name_reservation.original_applicant.name (a transfer to oneself is vacuous).
    depends_on_keys:
      - name_reservation.original_applicant.name
      - name_reservation.transferee.name
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty (Shape D).
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: filing-date-signed-present
    description: filing.date_signed is non-empty and not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-fields-nonempty
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (cover-letter primitive)."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: expedited-service-set
    description: "filing.expedited_service is exactly one of hold_for_pickup | 24h_next_business_day | immediate_same_day."
    depends_on_keys:
      - filing.expedited_service
    severity: required
  - id: fee-base-20
    description: filing.total_fees_dollars equals $20 base plus expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: advisory
