checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: domestication-effective-date-required
    description: domestication.effective_date is non-empty.
    depends_on_keys:
      - domestication.effective_date
    severity: required
  - id: effective-date-on-or-after-filing
    description: "domestication.effective_date is on or after filing.date_signed (effective date can be the filing date or a later specified date, but cannot precede the filing)."
    depends_on_keys:
      - domestication.effective_date
      - filing.date_signed
    severity: required
  - id: new-jurisdiction-required
    description: domestication.new_jurisdiction is non-empty.
    depends_on_keys:
      - domestication.new_jurisdiction
    severity: required
  - id: new-jurisdiction-not-maine
    description: "domestication.new_jurisdiction is not 'Maine' or 'ME' (a domestication into Maine would not require an outbound charter surrender)."
    depends_on_keys:
      - domestication.new_jurisdiction
    severity: required
  - id: service-address-required
    description: domestication.service_of_process_mailing_address is non-empty (mandatory under §924.4 for SOS process forwarding).
    depends_on_keys:
      - domestication.service_of_process_mailing_address
    severity: required
  - id: filing-date-required
    description: filing.date_signed is non-empty.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: signer-required
    description: filing.signer.printed_name_and_capacity is non-empty (Shape D); the signer must be an officer or duly authorized representative per 13-C §924.1.
    depends_on_keys:
      - filing.signer.printed_name_and_capacity
    severity: required
  - id: fee-base-90
    description: filing.total_fees_dollars equals $90 base (per page 0 header) plus expedite premium.
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
  - id: contact-info-complete
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
