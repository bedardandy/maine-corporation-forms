checks:
  - id: entity-name-required
    description: entity.name is non-empty.
    depends_on_keys:
      - entity.name
    severity: required
  - id: exactly-one-nonprofit-type
    description: "Exactly one of THIRD options (Check Box2 = public_benefit, Check Box3 = mutual_benefit) is selected."
    depends_on_keys:
      - entity.nonprofit_type
    severity: required
  - id: purpose-text-when-required
    description: "If entity.nonprofit_type='public_benefit', entity.public_benefit_purpose must be non-empty. If entity.nonprofit_type='mutual_benefit', entity.mutual_benefit_purpose must be non-empty."
    depends_on_keys:
      - entity.nonprofit_type
      - entity.public_benefit_purpose
      - entity.mutual_benefit_purpose
    severity: required
  - id: location-required
    description: entity.location.municipality and entity.location.county are both non-empty (FOURTH recital is mandatory).
    depends_on_keys:
      - entity.location.municipality
      - entity.location.county
    severity: required
  - id: officers-count-matches-roster
    description: "entity.officers.count equals the number of populated entity.officers.<role>.name slots (typically 4)."
    depends_on_keys:
      - entity.officers.count
      - entity.officers.president.name
      - entity.officers.vice_president.name
      - entity.officers.secretary_or_clerk.name
      - entity.officers.treasurer.name
    severity: required
  - id: named-officers-required
    description: "entity.officers.president.name, entity.officers.vice_president.name, entity.officers.secretary_or_clerk.name, and entity.officers.treasurer.name are all non-empty (FIFTH lists all four roles inline)."
    depends_on_keys:
      - entity.officers.president.name
      - entity.officers.vice_president.name
      - entity.officers.secretary_or_clerk.name
      - entity.officers.treasurer.name
    severity: required
  - id: at-least-one-director
    description: director_1.name is non-empty (SIXTH provides 3 inline slots; at least one must be filled).
    depends_on_keys:
      - director_1.name
    severity: required
  - id: entity-contact-person-required
    description: entity.contact_person.name and entity.contact_person.mailing_address are non-empty (SEVENTH).
    depends_on_keys:
      - entity.contact_person.name
      - entity.contact_person.mailing_address
    severity: required
  - id: at-least-three-incorporators
    description: "At least 3 incorporators have printed_name populated (per page-1 footnote 'Pursuant to 13 MRSA §901, at least 3 incorporators are required')."
    depends_on_keys:
      - incorporator_1.printed_name
      - incorporator_2.printed_name
      - incorporator_3.printed_name
    severity: required
  - id: filing-date-required-not-future
    description: filing.date_signed is non-empty and not in the future.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-fields-nonempty
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (cover-letter primitive)."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-5-plus-expedite
    description: "filing.total_fees_dollars equals $5 base fee plus any expedite premium ($50 for 24h_next_business_day, $100 for immediate_same_day, $0 for hold_for_pickup)."
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
