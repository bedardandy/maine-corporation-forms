checks:
  - id: entity-name-nonempty
    description: "entity.name is non-empty (the LLC's current SOS-record name; for synth fills the same value goes into both 'name' and 'new name' widgets unless a name change is being effected)."
    depends_on_keys:
      - entity.name
    severity: required
  - id: llc-suffix-required
    description: "entity.name ends with one of the statutory LLC suffixes: 'Limited Liability Company', 'Limited Company', 'L.L.C.', 'LLC', 'L.C.', 'LC', or (if low-profit) 'L3C'/'l3c' (case-insensitive substring match per 31 MRSA §1508)."
    depends_on_keys:
      - entity.name
      - entity.is_low_profit_llc
    severity: required
  - id: initial-formation-date-required
    description: entity.initial_formation_date is non-empty (SECOND requires the original formation date to identify the LLC being restated).
    depends_on_keys:
      - entity.initial_formation_date
    severity: required
  - id: professional-services-when-flagged
    description: "If entity.is_professional_llc is true, entity.professional_services_description must be non-empty; if false, the description must be empty."
    depends_on_keys:
      - entity.is_professional_llc
      - entity.professional_services_description
    severity: required
  - id: low-profit-and-professional-mutually-exclusive
    description: entity.is_low_profit_llc and entity.is_professional_llc cannot both be true.
    depends_on_keys:
      - entity.is_low_profit_llc
      - entity.is_professional_llc
    severity: required
  - id: exactly-one-registered-agent-type
    description: Exactly one of FIFTH commercial/noncommercial options is selected.
    depends_on_keys:
      - registered_agent.type
    severity: required
  - id: cra-public-number-when-commercial
    description: "If registered_agent.type = 'commercial', registered_agent.cra_public_number must be set; if 'noncommercial', it must be absent."
    depends_on_keys:
      - registered_agent.type
      - registered_agent.cra_public_number
    severity: required
  - id: registered-agent-name-required
    description: "registered_agent.name is non-empty (regardless of type; one of 'agent' or 'noncommercial agent' must be filled)."
    depends_on_keys:
      - registered_agent.name
    severity: required
  - id: registered-agent-physical-not-pobox
    description: "registered_agent.physical_address must not begin with 'P.O.', 'PO Box', or 'Post Office Box' (form explicitly forbids P.O. Box)."
    depends_on_keys:
      - registered_agent.physical_address
    severity: required
  - id: at-least-one-authorized-signer
    description: "At least one of authorized_person_{1,2,3}.printed_name_and_capacity is non-empty."
    depends_on_keys:
      - authorized_person_1.printed_name_and_capacity
      - authorized_person_2.printed_name_and_capacity
      - authorized_person_3.printed_name_and_capacity
    severity: required
  - id: filing-date-not-future
    description: filing.date_signed is non-empty and not in the future relative to the submission date.
    depends_on_keys:
      - filing.date_signed
    severity: required
  - id: contact-info-complete
    description: "filing.contact.name, filing.contact.phone, and filing.contact.email are non-empty (per cover-letter NOTE)."
    depends_on_keys:
      - filing.contact.name
      - filing.contact.phone
      - filing.contact.email
    severity: required
  - id: fee-base-80
    description: filing.total_fees_dollars equals $80 base (per page 0 header) plus expedite premium ($0/$50/$100).
    depends_on_keys:
      - filing.total_fees_dollars
      - filing.expedited_service
    severity: optional
