name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  forms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run deterministic test suite
        # The suite is PDF-free: it validates the structured form artifacts
        # (catalog integrity, per-form folder consistency, schema/plan/route
        # logic). The blank PDFs are fetched on demand and are not needed here.
        run: python -m pytest tests/ -v
